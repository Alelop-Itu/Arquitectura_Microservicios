openapi: 3.0.0
info:
  title: Bank API
  version: 1.0.0
  description: API para gestión de clientes, cuentas y movimientos bancarios.
servers:
  - url: '{{base_url}}'
paths:
  /customers:
    post:
      summary: Crear nuevo cliente
      tags:
        - Customers
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                gender:
                  type: string
                identification:
                  type: string
                address:
                  type: string
                phone:
                  type: string
                password:
                  type: string
                  format: password
                status:
                  type: boolean
            example:
              name: Jose Lema
              gender: Masculino
              identification: '1712345601'
              address: Otavalo sn y principal
              phone: '098254785'
              password: '1234'
              status: true
      responses:
        '201':
          description: Creado con éxito
    get:
      summary: Listar todos los clientes
      tags:
        - Customers
      responses:
        '200':
          description: Consulta exitosa

  /accounts:
    post:
      summary: Crear nueva cuenta
      tags:
        - Accounts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                type:
                  type: string
                balance:
                  type: number
                status:
                  type: boolean
                customerId:
                  type: integer
            example:
              number: '478758'
              type: Ahorros
              balance: 2000
              status: true
              customerId: 1
      responses:
        '201':
          description: Creado con éxito
    get:
      summary: Listar todas las cuentas
      tags:
        - Accounts
      responses:
        '200':
          description: Consulta exitosa

  /movements:
    post:
      summary: Registrar movimiento
      tags:
        - Movements
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                accountNumber:
                  type: string
                type:
                  type: string
                value:
                  type: number
            example:
              accountNumber: '478758'
              type: DEBIT
              value: 575
      responses:
        '201':
          description