version: '3.8'
services:
  db:
    image: postgres:15
    container_name: bank_postgres
    environment:
      POSTGRES_USER: user_bank
      POSTGRES_PASSWORD: 963
      POSTGRES_DB: BaseDatos
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/BaseDatos
      SPRING_DATASOURCE_USERNAME: user_bank
      SPRING_DATASOURCE_PASSWORD: 963